<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav>
            <div class="nav-links">
                <a href="#">Gmail</a>
                <a href="#">Images</a>
            </div>
            <div class="nav-profile">
                <img src="https://via.placeholder.com/32" alt="Profile">
            </div>
        </nav>
    </header>

    <main>
        <img class="logo" src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" alt="Google Logo">

        <div class="search-container">
            <input type="text" class="search-input" placeholder="Rechercher sur Google">
            <div class="search-buttons">
                <button class="btn">Recherche Google</button>
                <button class="btn">J'ai de la chance</button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 France</p>
    </footer>
</body>
</html>
